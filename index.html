<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Untuk Kamu</title>
    <style>
        body {
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #ff7a7a;
        }

        p {
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Untuk Kamu</h1>
    <p>
        Hai...<br><br>

        (ISI SURAT KAMU DI SINI YA 😭💌)<br><br>

        Makasih ya untuk semua yang pernah kita lewatin.<br>
        Semoga kamu bahagia selalu.<br><br>

        — dari aku
    </p>
</div>

</body>
</html>
